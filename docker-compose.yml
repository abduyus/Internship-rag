services:
  app:
    build: .
    container_name: rag-app
    env_file:
      - .env
    depends_on:
      - qdrant
    # Run non-interactively by default using the MESSAGE env var from .env
    command: [ "python", "agent.py", "--message", "${MESSAGE}" ]
    # For local interactive development you can enable a TTY and stdin:
    # stdin_open: true
    # tty: true

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  qdrant_storage:
  ollama_data:
